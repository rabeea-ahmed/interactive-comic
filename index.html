<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Alice in teamLab</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
   <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
   <link rel="stylesheet" href="main.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

</head>

<body>
    <!-- title -->
    <section class="name">
        <img src="img/title.png" alt="">
    </section>
    <div class="scroll-down bounce">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
            class="bi bi-chevron-double-down" viewBox="0 0 16 16">
            <path fill-rule="evenodd"
                d="M1.646 6.646a.5.5 0 0 1 .708 0L8 12.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708" />
            <path fill-rule="evenodd"
                d="M1.646 2.646a.5.5 0 0 1 .708 0L8 8.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708" />
        </svg>
        scroll down
    </div>

    <!-- panel 1 - Vy -->
   <section class="panel1">
       <img src="img/panel1.png" alt="" data-aos="fade-in" data-aos-duration="1000">
   </section>

   <!-- comments - Ruxuan -->
   <section class="comment">
       <img src="img/comment.jpg" alt="4 students commmenting on the piece"
       data-aos="fade-in" data-aos-duration="2000">
   </section>

   <!-- panel 2 - Ruxuan and Vy -->
   <section class="panel2">
       <div class="sticky">
           <img src="img/panel2.jpg" id="zoomImg" alt="4 students getting sucked into the art piece">

           <div class="fade"></div>
       </div>
   </section>

   <!-- Scream -->
   <div class="quote-scroll-wrapper">
       <div class="quote-scroll">
           <div class="quote">
               AAAAAAAAAAAAAHHHHH - wHoOoOoOoOoOoOoO
           </div>
       </div>
   </div>

   <!-- panel 3 - Vy -->
   <section class="panel3">
       <img src="img/panel3.png" alt="" data-aos="zoom-in" data-aos-duration="2000" >
   </section>

   <!-- comments -->
    <section class="comment2">
       <img src="img/storyline1.png" alt="4 students commmenting on the piece"
       data-aos="fade-in" data-aos-duration="2000">
   </section>

  <!-- panel 4 - Geetika -->
    <section class="panel4">
        <div id="geetika_animation">
            <div id="shoe_container">
                <img data-aos="mega-zoom" src="img/shoe.PNG" alt="shoe">
            </div>
        </div>
    </section>

   <!-- panel 5 - Rabeea -->
   <section class="panel5" data-aos="zoom-in-down" data-aos-duration="1500">
       <section class="background">
           <img src="img/graffiti-nature.png">
           <section class="characters">
               <div><img id="ruxuan" src="img/ruxuan.png"></div>
               <div><img id="geetika" src="img/geetika.png"></div>
               <div><img id="rabeea" src="img/rabeea.png"></div>
               <div><img id="vy" src="img/vy.png"></div>
           </section>
       </section>
   </section>

   <!-- comments -->
    <section class="comment2">
       <img src="img/storyline2.png" alt="4 students commmenting on the piece"
       data-aos="fade-in" data-aos-duration="2000">
   </section>

   <!-- panel 6 - Ruxuan and Vy -->
   <section class="panel6">
       <div class="carousel" id="carousel">
           <img src="img/1.png" class="active">
           <img src="img/2.png">
           <img src="img/3.png">
           <img src="img/4.png">
           <img src="img/5.png">
       </div>
   </section>

   <!-- footer -->
    <footer>
        <div>IM-UH 1011 Project created by Vy, Geetika, Rabeea, Ruxuan.</div>
    </footer>

   <!-- scripts -->
   <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
   <script src="script.js"> </script>
   <script>
       AOS.init();
   </script>
</body>


</html>
